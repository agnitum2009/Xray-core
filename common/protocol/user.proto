syntax = "proto3";

package xray.common.protocol;
option csharp_namespace = "Xray.Common.Protocol";
option go_package = "github.com/xtls/xray-core/common/protocol";
option java_package = "com.xray.common.protocol";
option java_multiple_files = true;

import "common/serial/typed_message.proto";

// User is a generic user for all protocols.
message User {
  uint32 level = 1;
  string email = 2;

  // Protocol specific account information. Must be the account proto in one of
  // the proxies.
  xray.common.serial.TypedMessage account = 3;

  // Legacy per-user speed limit in bytes per second. Zero means unlimited.
  // Kept for compatibility and treated as downlink when directional limits are absent.
  uint64 speed_limit = 4;

  // Per-user concurrent device/IP limit. Zero means unlimited.
  uint32 device_limit = 5;

  // Per-user uplink limit in bytes per second: client upload / server inbound.
  // Zero means unlimited.
  uint64 up_speed_limit = 6;

  // Per-user downlink limit in bytes per second: server outbound / client download.
  // Zero means unlimited.
  uint64 down_speed_limit = 7;
}
